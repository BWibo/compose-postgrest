services:
  postgrest-db:
    ports:
      - "5432:5432"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    networks:
      - postgrest-backend
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - postgrest
      - swagger-ui

volumes:
  caddy_data:
  caddy_config:
